name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # У проекта пока нет eslint/тестов — сборка ловит хотя бы синтаксические
      # и типовые ошибки, которые иначе всплыли бы только на проде после деплоя
      - name: Build
        run: npm run build
        env:
          NUXT_PUBLIC_API_BASE: https://online-store-back.fly.dev/api
