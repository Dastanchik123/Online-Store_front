app = "online-store-hyu-ta"
primary_region = "fra"

[build]

[env]
  PORT = "3000"
  NUXT_PUBLIC_API_BASE = "https://online-store-back.fly.dev/api"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[http_service.concurrency]
  type = "requests"
  hard_limit = 250
  soft_limit = 200
